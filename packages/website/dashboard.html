<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Mergenote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:40px;max-width:440px;width:100%}
.login{text-align:center}
.login h2{margin-bottom:8px}
.login p{color:#8b949e;margin-bottom:24px;font-size:14px}
.gh-btn{display:inline-flex;align-items:center;gap:8px;background:#24292e;color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;font-size:15px;text-decoration:none;border:1px solid #30363d}
.gh-btn:hover{background:#30363d}
.profile{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.profile img{width:48px;height:48px;border-radius:50%}
.profile .name{font-weight:700}
.profile .email{font-size:13px;color:#8b949e}
.logout{margin-left:auto;background:none;border:1px solid #30363d;padding:6px 14px;border-radius:8px;cursor:pointer;color:#e6edf3;font-size:13px}
.logout:hover{border-color:#8b949e}
.info{background:#0d1117;border-radius:10px;padding:16px;margin-bottom:16px}
.info-row{display:flex;justify-content:space-between;margin-bottom:8px}
.info-row:last-child{margin-bottom:0}
.info-row .label{color:#8b949e;font-size:13px}
.info-row .value{font-weight:700;font-size:13px}
.config{background:#0d1117;border-radius:10px;padding:16px}
.config h4{font-size:13px;margin-bottom:8px}
.config pre{font-size:11px;color:#8b949e;overflow-x:auto;white-space:pre-wrap}
.error{background:#3d1f1f;border:1px solid #f85149;border-radius:10px;padding:12px;margin-bottom:16px;color:#f85149;font-size:13px}
#content{display:none}
</style>
</head>
<body>
<div class="card">
  <div id="error" class="error" style="display:none"></div>
  <div id="login" class="login">
    <h2>Sign in to Mergenote</h2>
    <p>Manage your license and unlock Pro features.</p>
    <a id="login-btn" class="gh-btn" href="">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.79 2.73 1.27 3.4.97.1-.76.41-1.27.74-1.56-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.42.36.8 1.08.8 2.18v3.23c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5z"/></svg>
      Continue with GitHub
    </a>
  </div>
  <div id="content">
    <div class="profile">
      <img id="avatar" src="" alt="avatar">
      <div><div id="name" class="name"></div><div id="email" class="email"></div></div>
      <button id="logout-btn" class="logout">Logout</button>
    </div>
    <div class="info">
      <div class="info-row"><span class="label">Tier</span><span id="tier" class="value"></span></div>
      <div class="info-row"><span class="label">Status</span><span id="status" class="value"></span></div>
      <div class="info-row"><span class="label">License Key</span><span id="key" class="value" style="word-break:break-all;font-family:monospace"></span></div>
    </div>
    <div class="config">
      <h4>Claude Desktop Config</h4>
      <pre id="config"></pre>
    </div>
  </div>
</div>
<script>
(function(){
  var API='http://localhost:3100';
  document.getElementById('login-btn').href=API+'/api/auth/github';

  // Show error from OAuth redirect
  var err=new URLSearchParams(location.search).get('error');
  if(err){
    var el=document.getElementById('error');
    el.style.display='block';
    el.textContent='Login failed: '+err.replace(/_/g,' ');
  }

  // Check if logged in
  fetch(API+'/api/auth/me',{credentials:'include'})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(data){
      if(!data){document.getElementById('login').style.display='block';return;}
      document.getElementById('login').style.display='none';
      document.getElementById('content').style.display='block';
      document.getElementById('avatar').src=data.user.avatar_url||'';
      document.getElementById('name').textContent='@'+data.user.github_login;
      document.getElementById('email').textContent=data.user.email||'';
      var lic=data.license;
      document.getElementById('tier').textContent=lic?lic.tier:'free';
      document.getElementById('status').textContent=lic?lic.status:'no license';
      document.getElementById('key').textContent=lic?lic.license_key:'\u2014';
      document.getElementById('config').textContent=JSON.stringify({mcpServers:{mergenote:{command:"npx",args:["mergenote"],env:{GITHUB_TOKEN:"your_token",MERGENOTE_LICENSE:lic?lic.license_key:"your_key",LICENSE_API_URL:API}}}},null,2);
    }).catch(function(){});

  document.getElementById('logout-btn').addEventListener('click',function(){
    fetch(API+'/api/auth/logout',{method:'POST',credentials:'include'}).then(function(){location.reload();});
  });
})();
</script>
</body>
</html>
